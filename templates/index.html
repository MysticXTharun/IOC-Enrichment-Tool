<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IOC Enrichment Tool</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="/static/css/style.css">
</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <h1 class="text-center mb-4">
        IOC Enrichment Tool
    </h1>

    <div class="card bg-secondary border-0 shadow">

        <div class="card-body">

            <h4 class="mb-3">
                Search IOC
            </h4>

<div class="row mb-4" id="dashboardCards">

    <div class="col-md-3">
        <div class="card bg-dark text-white">
            <div class="card-body text-center">
                <h6>Total IOCs</h6>
                <h2 id="totalIOCs">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-dark text-white">
            <div class="card-body text-center">
                <h6>IP Addresses</h6>
                <h2 id="ipCount">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-dark text-white">
            <div class="card-body text-center">
                <h6>URLs</h6>
                <h2 id="urlCount">0</h2>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-dark text-white">
            <div class="card-body text-center">
                <h6>Hashes</h6>
                <h2 id="hashCount">0</h2>
            </div>
        </div>
    </div>

</div>

            <div class="input-group">

                <input
                    id="iocInput"
                    type="text"
                    class="form-control"
                    placeholder="Enter IP, Domain, URL or Hash">

                <button
                    id="searchBtn"
                    class="btn btn-primary">
                    Enrich
                </button>

            </div>

        </div>

    </div>

<div id="result"></div>

<hr class="my-5">

<div class="card bg-secondary shadow border-0">

    <div class="card-header">

        <h3>Search History</h3>

    </div>

    <div class="card-body">

        <table class="table table-dark table-hover">

            <thead>

                <tr>

                    <th>IOC</th>
                    <th>Type</th>
                    <th>Source</th>
                    <th>Date</th>

                </tr>

            </thead>

            <tbody id="historyTable">

            </tbody>

        </table>

    </div>

</div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
